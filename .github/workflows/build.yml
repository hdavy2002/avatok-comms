# .github/workflows/build.yml — AvaTok Comms
#
# Builds the AvaTok Comms Android debug APK on a Linux runner.
# Same recipe as github.com/hdavy2002/jami-build-runner (which builds
# upstream Jami stock), but pointed at OUR :app module instead of
# Jami's. The vendored Jami submodule provides libjamiclient + the
# C++ daemon; we apply the same build-time patches before invoking
# gradle.
#
# Triggers:
#   - push to main: re-runs on any change to this repo
#   - manual: Actions → "Build AvaTok Comms" → Run workflow

name: Build AvaTok Comms

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Versions matching Jami's docker/Dockerfile (vendor/jami-client-android/docker/Dockerfile)
  # — bump these in sync if you bump the submodule.
  NDK_VERSION: '29.0.14206865'
  CMAKE_VERSION: '4.1.2'
  BUILD_TOOLS_VERSION: '36.1.0'
  ANDROID_API_LEVEL: '36'
  SWIG_VERSION: '4.2.1'
  TARGET_ABI: 'arm64-v8a'

permissions:
  contents: write   # needed to publish a GitHub Release on successful main builds

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout avatok-comms (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---------------------------------------------------------------
      # 1. Linux toolchain (mirrors vendor/jami-client-android/docker/Dockerfile)
      # ---------------------------------------------------------------
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            asciidoc autoconf autogen automake autopoint bc bison \
            build-essential bzip2 cmake curl doxygen gettext git \
            libpcre2-dev libpcre3 libpcre3-dev libtool locales m4 nasm \
            ninja-build pkg-config python-is-python3 ruby ruby-dev ssh \
            texinfo unzip yasm zip
          sudo locale-gen en_US.UTF-8
          sudo update-locale LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8

      # ---------------------------------------------------------------
      # 2. SWIG >= 4.2 from source (Ubuntu Noble's package is too old)
      # ---------------------------------------------------------------
      - name: Cache SWIG build
        id: cache-swig
        uses: actions/cache@v4
        with:
          path: /opt/swig
          key: swig-${{ env.SWIG_VERSION }}-ubuntu-24.04

      - name: Build & install SWIG ${{ env.SWIG_VERSION }} from source
        if: steps.cache-swig.outputs.cache-hit != 'true'
        run: |
          wget -O /tmp/swig.tar.gz \
            https://github.com/swig/swig/archive/v${SWIG_VERSION}.tar.gz
          sudo tar xzf /tmp/swig.tar.gz -C /opt
          sudo mv /opt/swig-${SWIG_VERSION} /opt/swig
          cd /opt/swig
          sudo ./autogen.sh
          sudo ./configure --prefix=/opt/swig/install
          sudo make -j$(nproc)
          sudo make install

      - name: Add SWIG to PATH
        run: |
          echo "/opt/swig/install/bin" >> $GITHUB_PATH
          /opt/swig/install/bin/swig -version

      # ---------------------------------------------------------------
      # 3. JDK 17 — AGP 9.1 requirement
      # ---------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------------------------------------------------------
      # 4. Android SDK + NDK + CMake
      # ---------------------------------------------------------------
      - name: Set up Android SDK (base only)
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools'

      - name: Install Android SDK packages individually
        run: |
          set -e
          yes Y | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-${ANDROID_API_LEVEL}"
          sdkmanager "build-tools;${BUILD_TOOLS_VERSION}"
          sdkmanager "ndk;${NDK_VERSION}"
          sdkmanager "cmake;${CMAKE_VERSION}"

      - name: Export Android env
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      # ---------------------------------------------------------------
      # 5. Apply build-time patches to the Jami submodule (in-place,
      #    NOT committed back). Same set as jami-build-runner.
      # ---------------------------------------------------------------
      - name: "Patch: downgrade Jami's gradle wrapper to 9.3.1 (avoid 9.4.0-rc-1 deadlock)"
        working-directory: vendor/jami-client-android
        run: |
          PROP=jami-android/gradle/wrapper/gradle-wrapper.properties
          # idempotent — checks both directions
          if grep -q 'gradle-9.4.0-rc-1' "$PROP"; then
            sed -i 's|gradle-9.4.0-rc-1-bin\.zip|gradle-9.3.1-bin.zip|' "$PROP"
          fi
          grep distributionUrl "$PROP"

      - name: "Patch: add -module JamiService to make-swig.sh"
        working-directory: vendor/jami-client-android
        run: |
          SCRIPT=daemon/bin/jni/make-swig.sh
          if ! grep -q -- '-module JamiService' "$SCRIPT"; then
            sed -i 's|^swig -v -c++ -java \\$|swig -v -c++ -java -module JamiService \\|' "$SCRIPT"
          fi
          grep -n -- '-module JamiService' "$SCRIPT"

      - name: "Patch: rename values-nn_NO → values-nn-rNO"
        working-directory: vendor/jami-client-android
        run: |
          OLD=jami-android/app/src/main/res/values-nn_NO
          NEW=jami-android/app/src/main/res/values-nn-rNO
          if [ -d "$OLD" ]; then mv "$OLD" "$NEW"; fi
          ls -d "$NEW" 2>/dev/null && echo "OK"

      # ---------------------------------------------------------------
      # 6. Bootstrap Jami daemon tools (m4/libtool/autotools/pkg-config)
      # ---------------------------------------------------------------
      - name: Bootstrap Jami daemon tools
        working-directory: vendor/jami-client-android/daemon/extras/tools
        run: |
          ./bootstrap
          make -j 1
          export PATH="$(pwd)/build/bin:$PATH"
          make -j 1
          echo "$(pwd)/build/bin" >> $GITHUB_PATH

      # ---------------------------------------------------------------
      # 7. Pre-generate SWIG JNI bindings (so Kotlin compile of
      #    libjamiclient sees the generated classes from the start)
      # ---------------------------------------------------------------
      - name: Pre-generate SWIG JNI bindings
        working-directory: vendor/jami-client-android/daemon/bin/jni
        env:
          PACKAGEDIR: ${{ github.workspace }}/vendor/jami-client-android/jami-android/libjamiclient/src/main/java
        run: |
          ./make-swig.sh

      # ---------------------------------------------------------------
      # 8. Gradle cache
      # ---------------------------------------------------------------
      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      # ---------------------------------------------------------------
      # 9. First gradle pass — expected to fail at yaml-cpp find_package.
      #    Side-effect we want: creates daemon/contrib/build-aarch64-linux-android/.
      # ---------------------------------------------------------------
      - name: First gradle pass to bootstrap contrib dir (expected to fail at yaml-cpp)
        id: first_pass
        continue-on-error: true
        run: |
          ./gradlew :app:assembleDebug \
            -Parchs=${TARGET_ABI} \
            --no-daemon \
            --max-workers=2 \
          2>&1 | tee gradle-first-pass.log || true
          true

      # ---------------------------------------------------------------
      # 10. Build yaml-cpp explicitly IF the contrib build dir was
      #     created by the first gradle pass.
      #
      #     Note: while our :app module is purely Kotlin/Compose (no
      #     JNI dependency on the daemon), the first gradle pass will
      #     NOT trigger the daemon's native build, so no contrib dir
      #     exists. That's fine — yaml-cpp isn't needed in that case.
      #     This step becomes load-bearing once :app starts linking
      #     against libjami via libjamiclient (Phase 2 commit 3).
      # ---------------------------------------------------------------
      - name: Build yaml-cpp contrib explicitly (skip if daemon not triggered)
        working-directory: vendor/jami-client-android/daemon/contrib
        run: |
          BUILD_DIR=build-aarch64-linux-android
          if [ ! -d "$BUILD_DIR" ]; then
            echo "::notice::No contrib build dir — :app didn't pull in libjami daemon yet. Skipping yaml-cpp step."
            exit 0
          fi
          cd "$BUILD_DIR"
          make .yaml-cpp
          test -f "../aarch64-linux-android/lib/cmake/yaml-cpp/yaml-cpp-config.cmake" \
            || { echo "::error::yaml-cpp-config.cmake not produced"; exit 1; }

      # ---------------------------------------------------------------
      # 11a. Inject google-services.json from GitHub Actions secret.
      #
      # The Firebase project `avatok-comms` (project number 998388047199,
      # Android app id 1:998388047199:android:2aa79d6fc101aebf30eaea) owns
      # the FCM credentials that wake the user's phone. Its config JSON is
      # stored as the GH Actions secret GOOGLE_SERVICES_JSON_BASE64.
      #
      # We never commit google-services.json to the public repo, but it
      # has to be on disk at app/google-services.json before Gradle builds
      # the withFirebase flavor so the google-services plugin can read it.
      # ---------------------------------------------------------------
      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 secret is not set."
            echo "::error::Set it on hdavy2002/avatok-comms via:"
            echo "::error::  base64 -i google-services.json | gh secret set GOOGLE_SERVICES_JSON_BASE64 --repo hdavy2002/avatok-comms"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json
          # Sanity check: confirm it parses and has the expected project.
          if ! jq -e '.project_info.project_id == "avatok-comms"' app/google-services.json > /dev/null; then
            echo "::error::google-services.json did not look right (project_id != avatok-comms)."
            exit 1
          fi
          echo "google-services.json injected ($(wc -c < app/google-services.json) bytes)"

      # ---------------------------------------------------------------
      # 11b. Real build — our :app module (withFirebase flavor)
      #
      # withFirebase uses FCM directly. The Jami DHT proxy
      # (dhtproxy.jami.net) cannot push to our FCM project (its
      # credentials are Jami's, not ours), so we route through a small
      # Cloudflare Worker at avatok-comms-bridge.getmystuffme.workers.dev
      # that does the FCM-token → push translation for us. The daemon
      # registers as platform="unifiedpush" with the Worker URL; see
      # JamiApplicationFirebase.kt for the wiring.
      #
      # Result: zero on-device friction (no ntfy install), zero on-going
      # cost (Worker is free-tier, FCM is free forever, KV is free-tier).
      #
      # We do NOT build the noPush or withUnifiedPush flavors here:
      #   - noPush has no wakeup; cross-cellular delivery fails.
      #   - withUnifiedPush needs the user to install ntfy; we skip that.
      #
      # See openspec change add-avatok-comms-push-wakeup in the avatok
      # repo for the full architecture rationale.
      # ---------------------------------------------------------------
      - name: Build AvaTok APK (withFirebase, real pass)
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :app:assembleWithFirebaseDebug \
            -PbuildFirebase=true \
            -Parchs=${TARGET_ABI} \
            --no-daemon \
            --max-workers=2 \
            --stacktrace \
          2>&1 | tee gradle-build.log

      # ---------------------------------------------------------------
      # 12. Locate and verify the APK
      # ---------------------------------------------------------------
      - name: Find and verify APK
        id: apk
        run: |
          # Pin to the withFirebase output dir so we never accidentally
          # ship a no-push or ntfy-flavored APK again. The Gradle
          # assemble task above only builds this flavor, but a defensive
          # glob protects us against someone re-broadening the task.
          APK=$(find app/build/outputs/apk/withFirebase -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No withFirebase APK produced. See gradle-build.log."
            exit 1
          fi
          ls -la "$APK"
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

      - name: Stage APK with stable filename
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cp "${{ steps.apk.outputs.apk_path }}" /tmp/avatok-comms-arm64-debug.apk
          ls -la /tmp/avatok-comms-arm64-debug.apk

      - name: Get Jami daemon short SHA (for release tag)
        id: jami_sha
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: vendor/jami-client-android/daemon
        run: |
          echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-jami-${{ steps.jami_sha.outputs.short }}
          name: "AvaTok build #${{ github.run_number }} — debug (daemon ${{ steps.jami_sha.outputs.short }})"
          body: |
            **AvaTok Comms** Android **debug** APK — Phase 2 scaffolding.

            Built from this repo's `main` at commit `${{ github.sha }}`,
            with vendored Jami daemon at `${{ steps.jami_sha.outputs.short }}`.

            Architecture: arm64-v8a only.

            **Install on phone:** open this page on the phone, tap the APK
            file to download, then tap to install (Android may prompt
            "Install unknown apps" for the browser the first time).

            This is GPL-3.0 software. Source is in this repo.
            [Workflow run #${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          files: /tmp/avatok-comms-arm64-debug.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: avatok-comms-arm64-debug.apk
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build.log
          path: gradle-build.log
          retention-days: 7
